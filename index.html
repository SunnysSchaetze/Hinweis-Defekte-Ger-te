<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hinweis Defekte Geräte</title>
  <style>
    body {
      background-color: black;
      color: #ff7f00;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 90%;
      max-width: 800px;
      padding: 2vw;
      box-sizing: border-box;
    }

    h2 {
      color: #ff7f00;
      font-size: clamp(1rem, 5vw, 1.8rem);
      margin-top: 0;
      word-wrap: normal;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .leitfaden-box {
      background-color: #1a1a1a;
      border: 2px solid #ff7f00;
      border-radius: 10px;
      padding: clamp(10px, 1.5vw, 20px);
      margin: 2vw 0;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      color: #ff7f00;
      width: 100%;
      text-align: center;
      transition: transform 0.2s;
    }

    .leitfaden-box:hover {
      transform: scale(1.02);
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>⚡ Hinweis: Defekte Geräte ⚡</h2>
    <div class="leitfaden-box">
      <p>
        Sollte der Zustand in der Beschreibung als defekt angegeben sein, wird vor der Inbetriebnahme empfohlen, diese durch eine fachkundige Person prüfen zu lassen, um mögliche Schäden oder Fehlfunktionen zu vermeiden.
      </p>
    </div>
  </div>
</body>
</html>
